<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이능과 이념 사이의 어둠 - 공식 홈페이지</title>
    <style>
        :root {
            --bg-dark: #050a14;
            --bg-navy: #0a192f;
            --accent: #00f2ff;
            --accent-glow: rgba(0, 242, 255, 0.5);
            --glass: rgba(255, 255, 255, 0.05);
            --text: #ccd6f6;
            --text-bright: #ffffff;
            --viba-red: #ff0033;
            --viba-dark-red: #4a0000;
        }

        body.theme-viba {
            --accent: #ff0033;
            --accent-glow: rgba(255, 0, 51, 0.6);
        }

        body {
            margin: 0;
            background: var(--bg-dark);
            color: var(--text);
            font-family: 'Noto Sans KR', sans-serif;
            overflow-x: hidden;
            scroll-behavior: smooth;
            transition: 0.5s;
        }

        /* [모바일 대응] 최신화 버튼 위치 조정 */
        .read-now {
            position: fixed; top: 15px; right: 15px; z-index: 100;
            padding: 8px 15px; background: rgba(0, 0, 0, 0.7);
            border: 1px solid var(--accent); color: var(--accent);
            text-decoration: none; border-radius: 5px; font-weight: bold;
            font-size: 0.9rem; transition: 0.3s; box-shadow: 0 0 10px var(--accent-glow);
            backdrop-filter: blur(5px);
        }

        .hero {
            height: 60vh; position: relative; display: flex;
            align-items: center; justify-content: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1); overflow: hidden;
        }

        .hero-video {
            position: absolute; inset: 0; width: 100%; height: 100%;
            object-fit: cover; object-position: center 40%;
            z-index: 0; filter: brightness(0.35);
        }

        .hero-content { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; text-align: center; width: 90%; }

        /* [모바일 대응] 타이틀 크기 유동적으로 변경 */
        .title {
            font-size: clamp(1.8rem, 8vw, 3.5rem); color: var(--text-bright);
            text-shadow: 0 0 15px var(--accent), 0 0 30px var(--accent);
            margin-bottom: 10px; transition: 0.5s;
        }

        .subtitle { font-size: clamp(0.9rem, 3vw, 1.2rem); opacity: 0.8; margin-bottom: 30px; word-break: keep-all; }

        /* [모바일 대응] 네비게이션 간격 조정 */
        .main-nav { display: flex; gap: clamp(20px, 10vw, 150px); z-index: 10; justify-content: center; width: 100%; }
        .nav-group { display: flex; flex-direction: column; align-items: center; position: relative; }

        .btn-main {
            padding: 12px 25px; border: 2px solid var(--accent);
            background: transparent; color: var(--accent);
            font-weight: bold; border-radius: 50px; cursor: pointer;
            transition: 0.3s; font-size: clamp(0.85rem, 2.5vw, 1.1rem); box-shadow: 0 0 10px var(--accent-glow);
        }

        .genealogy-svg { display: none; width: max-content; height: 80px; margin-top: -5px; pointer-events: none; }
        
        /* [모바일 대응] 서브메뉴 가로폭 조정 */
        .sub-menu { display: none; justify-content: center; flex-wrap: wrap; gap: 10px; margin-bottom: 30px; opacity: 0; transform: translateY(-10px); transition: all 0.5s ease; }
        .sub-menu.show { display: flex; opacity: 1; transform: translateY(0); }

        .btn-sub {
            width: 130px; padding: 10px 0; background: var(--glass);
            border: 1px solid var(--accent); color: #fff; border-radius: 5px;
            cursor: pointer; transition: 0.3s; text-align: center; font-size: 0.9rem;
        }

        .content-area { padding: 30px 20px; min-height: 50vh; max-width: 1100px; margin: 0 auto; }
        .cat-intro { text-align: center; font-size: 1.1rem; color: var(--accent); margin-bottom: 30px; font-style: italic; word-break: keep-all; }

        .worldview-box { 
            display: none; background: var(--glass); 
            padding: 25px; border-radius: 15px; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); 
        }

        .char-list { display: none; flex-direction: column; gap: 60px; }

        /* [핵심 수정] 모바일에서는 세로 배치로 전환 */
        .char-item { display: flex; flex-direction: column; align-items: center; gap: 30px; width: 100%; }
        
        /* PC 화면(768px 이상)에서만 가로 배치 및 지그재그 적용 */
        @media (min-width: 768px) {
            .char-item { flex-direction: row; gap: 80px; }
            .char-item:nth-child(even) { flex-direction: row-reverse; }
            .char-img-box { height: 600px; flex: 1.3; }
            .hero { height: 55vh; }
            .read-now { top: 20px; right: 20px; padding: 10px 20px; font-size: 1rem; }
        }

        /* [모바일 대응] 이미지 박스 높이 조정 */
        .char-img-box { 
            width: 100%;
            height: 350px;
            background: none; 
            border: none; 
            border-radius: 15px; 
            display: flex; align-items: center; justify-content: center; 
            overflow: hidden; 
            transition: 0.5s; 
        }

        .char-img-box img { 
            transform: scale(1.1);
            width: 100%; height: 100%; 
            object-fit: cover; 
            object-position: center 20%; 
            opacity: 0.5; 
            transition: 0.4s;
        }
        
        .char-img-box:hover img { opacity: 1; transform: scale(1.05); }

        .char-info { width: 100%; text-align: center; }
        @media (min-width: 768px) { .char-info { text-align: left; flex: 1.2; } }

        .char-info h2 { font-size: clamp(1.8rem, 5vw, 2.5rem); color: var(--accent); margin: 0 0 15px 0; }
        .char-info p { font-size: 1.05rem; line-height: 1.6; opacity: 0.9; word-break: keep-all; }

    </style>
</head>
<body>

    <a href="#" class="read-now">최신화 보러가기</a>

    <div class="hero">
        <video class="hero-video" autoplay muted loop playsinline>
            <source src="video/girl_illustration.mp4" type="video/mp4">
        </video>
        <div class="hero-content">
            <h1 class="title">이능과 이념 사이의 어둠</h1>
            <p class="subtitle">'빛을 바랬던 소녀'와 '어둠을 삼킨 소년'이 만든 이야기</p>
            <div class="main-nav">
                <div class="nav-group">
                    <button id="btn-wv" class="btn-main" onclick="openHierarchy('worldview')">세계관 설명</button>
                    <div id="svg-worldview" class="genealogy-svg"><svg width="300" height="120"><path class="magic-path" d="M 150 0 V 40 L 70 100 M 150 40 L 230 100" /></svg></div>
                    <div id="worldview-nav" class="sub-menu">
                        <button class="btn-sub" onclick="setWorldview('past')">500년 전의 진실</button>
                        <button class="btn-sub" onclick="setWorldview('present')">현재의 정세</button>
                    </div>
                </div>
                <div class="nav-group">
                    <button id="btn-ch" class="btn-main" onclick="openHierarchy('character')">캐릭터 소개</button>
                    <div id="svg-character" class="genealogy-svg"><svg width="460" height="120"><path class="magic-path" d="M 230 0 V 40 L 70 100 M 230 40 V 100 M 230 40 L 390 100" /></svg></div>
                    <div id="character-nav" class="sub-menu">
                        <button class="btn-sub" onclick="setCharCategory('transcendent')">초월자</button>
                        <button id="btn-viba-choice" class="btn-sub" onclick="setCharCategory('viba')">비바</button>
                        <button class="btn-sub" onclick="setCharCategory('nightmare')">나이트메어</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="content-area">
        <div id="category-intro" class="cat-intro"></div>
        <div id="worldview-content" class="worldview-box"><h2 id="wv-title"></h2><div id="wv-text"></div></div>
        <div id="character-list" class="char-list"></div>
    </div>

    <script>
        function openHierarchy(type) {
            document.querySelectorAll('.genealogy-svg').forEach(el => el.style.display = 'none');
            document.querySelectorAll('.sub-menu').forEach(el => { el.style.display = 'none'; el.classList.remove('show'); });
            document.querySelectorAll('.btn-main').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.magic-path').forEach(line => line.classList.remove('animate-path'));
            document.getElementById('worldview-content').style.display = 'none';
            document.getElementById('character-list').style.display = 'none';
            document.getElementById('category-intro').innerText = "";

            const activeBtnId = type === 'worldview' ? 'btn-wv' : 'btn-ch';
            document.getElementById(activeBtnId).classList.add('active');
            const currentSvgBox = document.getElementById(`svg-${type}`);
            currentSvgBox.style.display = 'flex';
            const path = currentSvgBox.querySelector('.magic-path');
            void path.offsetWidth; path.classList.add('animate-path');
            setTimeout(() => { const nav = document.getElementById(`${type}-nav`); nav.style.display = 'flex'; setTimeout(() => nav.classList.add('show'), 10); }, 600);
        }

        function setWorldview(period) {
            const box = document.getElementById('worldview-content');
            box.style.display = 'block';
            document.getElementById('character-list').style.display = 'none';

            if(period === 'past') {
                document.getElementById('wv-title').innerText = "500년 전의 진실";
                document.getElementById('wv-text').innerHTML = "500년 전 평화로웠던 그 세상, 하늘에서 떨어진 ‘어둠’ 하나가 세계의 규칙을 바꿨다. 영웅은 자신을 네 갈래의 힘으로 나누어 어둠과의 전쟁을 끝냈다. 그렇게 믿었다. 하지만 승리의 자리에 남은 건 저주의 땅과 기록되지 않은 공백. 누군가는 어둠을 봉인했고, 누군가는 어둠과 함께 사라졌다. 그 결말 뒤에서, 세상에는 아직도 공백을 채우기 위한 대립이 지속되고 있다.";
            } else {
                document.getElementById('wv-title').innerText = "현재의 정세";
                document.getElementById('wv-text').innerHTML = "어둠에 물들인 세상, 세상은 나이트메어들의 등장으로 완전한 평화를 잃었다. 이때, 초월자 협회는 질서를 말하고 비바는 구원을 말한다—둘 다 “세상을 살리기 위해서”라고 주장한다. 하지만 최근의 사건들은, 누군가가 이념과는 다른 영문 모를 판을 짜고 있다는 흔적이 남는다.";
            }
            box.scrollIntoView({ behavior: 'smooth' });
        }

        function setCharCategory(cat) {
            const list = document.getElementById('character-list');
            const intro = document.getElementById('category-intro');
            list.style.display = 'flex';
            document.getElementById('worldview-content').style.display = 'none';
            list.innerHTML = ""; 

            // 테마 전환 로직은 유지: 텍스트 색상 등에 적용
            if(cat === 'viba') {
                document.body.classList.add('theme-viba');
                intro.innerText = "“심연의 힘에 발을 들인 자들의 기록.”";
            } else {
                // 비바 클릭 후 다른 곳을 클릭하면 테마가 초기화되도록 설정
                document.body.classList.remove('theme-viba'); 
                if(cat === 'transcendent') intro.innerText = "“세상 질서의 수호자, 초월자들의 계보.”";
                else if(cat === 'nightmare') intro.innerText = "“이념조차 없는 순수한 갈망, 경계 밖의 괴물들.”";
            }

            let characters = [];
            if(cat === 'transcendent') {
                // 초월자 진영 캐릭터 추가
                characters = [
                    { name: "나츠사카 (Natsusaka)", desc: "", img: "image/natsu.png" },
                    { name: "카시라기 (Kasiragi)", desc: "", img: "image/kasiragi.png" },
                    { name: "에리스 (Eris)", desc: "", img: "image/eris.png" },
                    { name: "레온 (Reon)", desc: "초월자 협회장. <br>초월자 협회에 오신 걸 환영합니다. <br>이곳에서만큼은 그대가 안심할 수 있기를 바라요.", img: "image/reon.png" },
                    { name: "진 (Jin)", desc: "NO.1 <br>'세상을 되돌릴 거다. 평화가 가득했던 그 시절로...'", img: "image/blue_question.png" },
                    { name: "레이 (Ray)", desc: "NO.2 <br>'하아? 바쁘니까 빨리 내 앞에서 사라져. 쓸데없는 거 묻지마.'", img: "image/blue_question.png" },
                    { name: "테무라이 (Temurai)", desc: "NO.3 <br>'동생에게 안심할 수 있는 경치를 보여주고 싶어요.'", img: "image/blue_question.png" },
                    { name: "슈링 (Syuling)", desc: "NO.4 <br>언젠가는 최고의 영웅으로 인정받고 싶어요!", img: "image/blue_question.png" },
                    { name: "테무로이 (Temuroi)", desc: "NO.5 <br>'나이트메어를 전부 베어내고 형에게 인정받을 거예요.'", img: "image/temuroi.png" },
                    { name: "바이튼 (Baiton)", desc: "NO.6 <br>'강자와 싸우는 게 취미일 뿐이다.'", img: "image/baiton.png" },
                    { name: "리즈 (Liz)", desc: "NO.7 <br>'내가 없으면 아마 협회는 잘 안 돌아갈걸?'", img: "image/Liz.png" },
                    { name: "쿠모 (Kumo)", desc: "NO.8 <br>'쿠모와 함께라면 무엇이든지 할 수 있거든!'", img: "image/kumo.png" },
                    { name: "그라이언 (Guraion)", desc: "NO.9 <br>'이능 사회에서 악한 자가 있다면 선한 자도 있어야 하지 않겠나?'", img: "image/guraion.png" },
                    { name: "졸비트 (Jolbit)", desc: "NO.10 <br>'모두가 날 알아줬으면 하니까?'", img: "image/jolbit.png" },
                ];
            } else if(cat === 'viba') {
                // 비바 진영 캐릭터 추가
                characters = [
                    { name: "???", desc: "비바 1번. <br>신도들은 그를 교신(敎神)으로 이끌었다..", img: "image/red_question.png" },
                    { name: "케이 (K)", desc: "비바 2번. <br>뼈 속 깊이 잠식한 어둠은 그의 정신을 갈라놨고, 어둠에 미친 살육자가 탄생했다.", img: "image/red_question.png" },
                    { name: "쿠로바나 (Kurobana)", desc: "비바 3번. <br>아담하고 귀여운 외모이나 본질은 사이코패스. <br>그녀의 꽃의 어둠에 잡히면 모든 걸 빨아먹힌다.", img: "image/kurobana.png" },
                    { name: "포마 (Fouma)", desc: "비바 4번. <br>어둠에게 인정받은 마술사. <br>그의 카드 마술의 손놀림은 모든 어둠을 조작한다.", img: "image/red_question.png" },
                    { name: "반다레네 (Bandarene)", desc: "비바 5번. <br>친근하고 온화한 할배. <br>외견과는 다르게 그의 어둠 안에는 수많은 망자들이 저주받고 있다.", img: "image/Bandarene.png" },
                    { name: "로시 (Rosi)", desc: "비바 6번. <br>그녀가 보이는 달콤한 환상은 어둠조차 홀린다.", img: "image/red_question.png" },
                    { name: "월랑 (Wolrang)", desc: "비바 7번. <br>야생에서 자란 난폭한 사내. <br>외롭게 자라온 그는 의존가능한 어둠을 원한다.", img: "image/wolrang.png" },
                    { name: "모치즈키 (Mochizuki)", desc: "비바 8번. <br>트라우마로 인해 깊이 남은 어둠. 밤이 깊어질수록 그의 어둠이 폭주한다.", img: "image/mochizuki.png" },
                    { name: "나츠사카 (Natsusaka)", desc: "비바 9번. <br>그의 어둠은 슬픔에 잠겨있다.", img: "image/natsusaka.png" },
                    { name: "???", desc: "비바 10번. <br><br> 공석.", img: "image/red_question.png" },
                ];
            } else if(cat === 'nightmare') {
                // 나이트메어 진영 캐릭터 추가
                characters = [
                    { name: "제라엘", desc: "S급 나이트메어, 용궁(龍弓)의 제라엘.", img: "image/nightmare1.png" },
                ];
            }

            // 캐릭터 이미지 하나만 사용하는 루프
            characters.forEach(char => {
                list.innerHTML += `
                    <div class="char-item">
                        <div class="char-img-box">
                            <img src="${char.img}" alt="${char.name}" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                            <span style="display:none; opacity: 0.3;">이미지 준비중</span>
                        </div>
                        <div class="char-info"><h2>${char.name}</h2><p>${char.desc}</p></div>
                    </div>
                `;
            });
            list.scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>
